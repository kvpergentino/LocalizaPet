{% extends 'base.html' %}

{% block content %}
<section class="max-w-md mx-auto px-6 py-12">
    <div class="bg-surface-container-lowest rounded-2xl shadow-xl overflow-hidden border border-outline-variant/10">
        <div class="btn-primary-gradient px-8 py-6">
            <h2 class="text-2xl font-bold text-on-primary font-headline">Entrar</h2>
            <p class="text-on-primary/80 mt-1">Para conectar-se, alertar e enviar mensagens.</p>
        </div>

        <form method="POST" class="p-8 space-y-6">
            {% csrf_token %}
            <div class="space-y-4 auth-form">
                {{ form.as_p }}
            </div>
            <button type="submit" class="w-full btn-primary-gradient text-on-primary py-3 rounded-xl font-headline font-bold shadow-lg hover:opacity-90 transition-all">
                Entrar
            </button>
            <p class="text-center text-sm text-on-surface-variant">
                Novo por aqui? <a href="{% url 'registro' %}" class="text-primary font-bold">Criar uma conta</a>
            </p>
        </form>
    </div>
</section>
{% endblock %}
