{% extends 'base.html' %}

{% block content %}
<section class="max-w-md mx-auto px-6 py-20">
    <div class="bg-surface-container-lowest rounded-2xl shadow-xl overflow-hidden text-center">
        <div class="bg-error/10 p-8">
            <span class="material-symbols-outlined text-error text-6xl">warning</span>
            <h2 class="text-2xl font-bold text-on-surface mt-4">Remover Anúncio</h2>
            <p class="text-on-surface-variant mt-2">
                Tem certeza que deseja remover o anúncio de<br>
                <strong class="text-on-surface">{{ pet.nome|default:"Pet sem nome" }}</strong>?
            </p>
        </div>
        
        <form method="POST" class="p-8">
            {% csrf_token %}
            <div class="flex gap-4">
                <a href="{% url 'detalhes_pet' pet.id %}" class="flex-1 px-6 py-3 rounded-xl border border-outline-variant/30 text-secondary font-bold hover:bg-surface-container-low transition-colors">
                    Cancelar
                </a>
                <button type="submit" class="flex-1 bg-error text-on-error px-6 py-3 rounded-xl font-bold hover:opacity-90 transition-colors">
                    Sim, Remover
                </button>
            </div>
        </form>
    </div>
</section>
{% endblock %}
